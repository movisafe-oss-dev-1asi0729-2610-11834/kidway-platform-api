# PostgreSQL profile for Render or any cloud Postgres provider.
server.port=${PORT:8080}

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# The seed runs only if the database is empty. Existing production data will not be overwritten.
kidway.seed.enabled=${KIDWAY_SEED_ENABLED:true}
kidway.seed.reset-on-start=${KIDWAY_SEED_RESET_ON_START:false}

# Set FRONTEND_URL after deploying the Angular app. You can keep localhost while testing locally.
kidway.cors.allowed-origins=${FRONTEND_URL:http://localhost:4200,http://127.0.0.1:4200}

springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

management.endpoints.web.exposure.include=health,info

# Use this profile when connecting to a local or cloud MySQL database.
# Example: SPRING_PROFILES_ACTIVE=mysql
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/kidway_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

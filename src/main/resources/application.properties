spring.application.name=KidWay Platform API
server.port=${PORT:8080}

# Default local datasource. It lets the backend run immediately without external services.
# This local profile uses H2 file storage for development and resets the seed on each start.
spring.datasource.url=jdbc:h2:file:./data/kidway-platform-api;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

kidway.seed.enabled=true
kidway.seed.reset-on-start=true
kidway.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

management.endpoints.web.exposure.include=health,info

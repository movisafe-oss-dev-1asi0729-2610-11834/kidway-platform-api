# Spring Application
spring.application.name=KidWay Platform API
server.port=${PORT:8080}

# Default local profile uses H2 so the API and Swagger run immediately without installing MySQL.
# For a cloud MySQL database, set DB_URL, DB_USERNAME, DB_PASSWORD, DB_DRIVER and HIBERNATE_DIALECT.
spring.datasource.url=${DB_URL:jdbc:h2:mem:kidway_platform;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.database-platform=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
documentation.application.description=@project.description@
documentation.application.version=@project.version@
